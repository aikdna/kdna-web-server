name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Verify exact release tag, package, and CHANGELOG binding
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/verify-release-context.cjs
      - run: npm run lint
      - run: npm test
      - name: Publish @aikdna/kdna-web-server
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@aikdna/kdna-web-server@$VERSION" version >/dev/null 2>&1; then
            echo "@aikdna/kdna-web-server@$VERSION is already published; skipping."
            exit 0
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
