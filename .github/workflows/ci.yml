name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: aikdna/kdna-assets
          ref: 931033e56be1c59457958da701b71a2da775021e
          path: public-assets
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Exercise the real Core 0.20.0 adapter path
        env:
          KDNA_WEB_CORE_ASSET: public-assets/references/public/laozi-wuwei/laozi-wuwei-0.1.0.kdna
        run: npm run test:core-compat
